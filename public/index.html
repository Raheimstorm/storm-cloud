<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="theme-color" content="#060810"/>
  <title>Storm</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500&family=Bebas+Neue&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    :root {
      --bg:        #060810;
      --bg2:       #0c0f1a;
      --bg3:       #111525;
      --electric:  #00d4ff;
      --violet:    #8b5cf6;
      --gold:      #f5a623;
      --danger:    #ff4444;
      --success:   #22c55e;
      --text:      #e2e8f0;
      --muted:     #64748b;
      --dim:       #334155;
      --border:    rgba(0,212,255,0.12);
      --glow:      rgba(0,212,255,0.3);
    }

    html { height: 100%; }
    body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Rajdhani', sans-serif;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* Grid background */
    body::before {
      content:'';
      position:fixed; inset:0;
      background-image:
        linear-gradient(rgba(0,212,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,212,255,0.025) 1px, transparent 1px);
      background-size: 50px 50px;
      pointer-events:none; z-index:0;
    }
    body::after {
      content:'';
      position:fixed; inset:0;
      background: radial-gradient(ellipse at center, transparent 20%, rgba(6,8,16,0.85) 100%);
      pointer-events:none; z-index:0;
    }

    /* ── LAYOUT ─────────────────────────────────────────────────────────── */
    #app {
      position: relative; z-index:1;
      display: flex; flex-direction: column;
      height: 100dvh; /* dynamic viewport height for mobile */
      overflow: hidden;
    }

    /* ── HEADER ─────────────────────────────────────────────────────────── */
    #header {
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 16px;
      height: 52px;
      border-bottom: 1px solid var(--border);
      background: rgba(6,8,16,0.95);
      backdrop-filter: blur(12px);
    }

    .wordmark { display:flex; align-items:center; gap:8px; }
    .bolt { font-size:1.3em; animation: bolt 2s ease-in-out infinite; }
    @keyframes bolt {
      0%,100%{ opacity:1; text-shadow:0 0 10px var(--electric); }
      50%{ opacity:0.5; text-shadow:none; }
    }
    .logo-text {
      font-family:'Bebas Neue',sans-serif;
      font-size:1.5em; letter-spacing:0.15em;
      color:var(--electric);
      text-shadow: 0 0 20px rgba(0,212,255,0.5);
    }
    .logo-sub {
      font-family:'JetBrains Mono',monospace;
      font-size:0.6em; color:var(--muted);
      letter-spacing:0.1em; margin-left:2px;
    }

    /* User badge + connect button */
    #user-area { display:flex; align-items:center; gap:10px; }
    #user-badge {
      font-family:'JetBrains Mono',monospace;
      font-size:0.65em; color:var(--success);
      background:rgba(34,197,94,0.08);
      border:1px solid rgba(34,197,94,0.2);
      border-radius:4px; padding:4px 8px;
      display:none;
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
      max-width:140px;
    }
    #connect-btn {
      font-family:'Rajdhani',sans-serif;
      font-size:0.8em; font-weight:600;
      letter-spacing:0.08em;
      padding:6px 12px; border-radius:4px;
      border:1px solid var(--border);
      background:transparent; color:var(--muted);
      cursor:pointer; transition:all 0.2s;
      white-space:nowrap;
    }
    #connect-btn:hover { border-color:var(--electric); color:var(--electric); }
    #connect-btn.connected { border-color:rgba(34,197,94,0.3); color:var(--success); cursor:default; }

    /* Status dots row */
    #status-row {
      display:flex; gap:6px; align-items:center;
    }
    .dot-wrap { display:flex; align-items:center; gap:3px; }
    .sdot {
      width:5px; height:5px; border-radius:50%;
      background: var(--dim);
    }
    .sdot.ok { background:var(--success); animation:dpulse 1.5s ease-in-out infinite; }
    .sdot.warn { background:var(--gold); }
    .sdot.err { background:var(--danger); }
    @keyframes dpulse {
      0%,100%{ opacity:1; } 50%{ opacity:0.4; }
    }
    .dot-label {
      font-family:'JetBrains Mono',monospace;
      font-size:0.55em; color:var(--dim); letter-spacing:0.05em;
    }

    /* ── CENTRE STAGE ───────────────────────────────────────────────────── */
    #stage {
      flex:1; display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      padding:16px 20px; overflow:hidden; min-height:0;
      position:relative;
    }

    /* ── ORB ──────────────────────────────────────────────────────────── */
    #orb-wrap {
      position:relative; width:160px; height:160px;
      display:flex; align-items:center; justify-content:center;
      flex-shrink:0; margin-bottom:20px;
    }
    .ring {
      position:absolute; border-radius:50%;
      border:1px solid var(--electric); opacity:0.15;
    }
    .ring:nth-child(1){ width:160px;height:160px; animation:rot 10s linear infinite; }
    .ring:nth-child(2){ width:128px;height:128px; animation:rot 7s linear infinite reverse; border-style:dashed; opacity:0.08; }
    .ring:nth-child(3){ width:96px;height:96px; animation:rot 15s linear infinite; opacity:0.05; }
    @keyframes rot { to{ transform:rotate(360deg); } }

    #orb {
      width:76px; height:76px; border-radius:50%;
      background: radial-gradient(circle at 35% 35%,
        rgba(0,212,255,0.25) 0%, rgba(139,92,246,0.1) 60%, transparent 100%);
      border:1px solid rgba(0,212,255,0.35);
      box-shadow: 0 0 24px rgba(0,212,255,0.1), inset 0 0 20px rgba(0,212,255,0.04);
      transition:all 0.4s cubic-bezier(0.34,1.56,0.64,1);
    }

    body.listening #orb {
      width:90px;height:90px;
      background:radial-gradient(circle at 35% 35%,rgba(0,212,255,0.5)0%,rgba(0,212,255,0.2)40%,transparent 100%);
      border-color:rgba(0,212,255,0.9);
      box-shadow:0 0 50px rgba(0,212,255,0.5),0 0 100px rgba(0,212,255,0.2);
      animation:orb-listen 0.8s ease-in-out infinite alternate;
    }
    @keyframes orb-listen {
      from{ transform:scale(1); }
      to  { transform:scale(1.07); }
    }
    body.processing #orb {
      background:radial-gradient(circle at 35% 35%,rgba(139,92,246,0.5)0%,rgba(0,212,255,0.2)60%,transparent 100%);
      border-color:rgba(139,92,246,0.7);
      box-shadow:0 0 50px rgba(139,92,246,0.4);
      animation:orb-spin 1.5s ease-in-out infinite;
    }
    @keyframes orb-spin {
      0%  { transform:rotate(0deg) scale(1); }
      50% { transform:rotate(180deg) scale(1.05); }
      100%{ transform:rotate(360deg) scale(1); }
    }
    body.speaking #orb {
      background:radial-gradient(circle at 35% 35%,rgba(0,212,255,0.6)0%,rgba(139,92,246,0.3)50%,transparent 100%);
      border-color:var(--electric);
      box-shadow:0 0 60px rgba(0,212,255,0.6);
      animation:orb-speak 0.35s ease-in-out infinite alternate;
    }
    @keyframes orb-speak { to{ transform:scale(1.04); } }
    body.confirming #orb {
      background:radial-gradient(circle at 35% 35%,rgba(245,166,35,0.5)0%,rgba(245,166,35,0.15)60%,transparent 100%);
      border-color:rgba(245,166,35,0.8);
      box-shadow:0 0 50px rgba(245,166,35,0.5);
      animation:orb-confirm 1s ease-in-out infinite alternate;
    }
    @keyframes orb-confirm {
      from{ box-shadow:0 0 40px rgba(245,166,35,0.4); }
      to  { box-shadow:0 0 80px rgba(245,166,35,0.7); }
    }

    /* State label */
    #state-label {
      font-family:'JetBrains Mono',monospace;
      font-size:0.65em; letter-spacing:0.25em;
      color:var(--dim); text-transform:uppercase;
      margin-bottom:20px; transition:color 0.3s; flex-shrink:0;
    }
    body.listening  #state-label { color:var(--electric); }
    body.processing #state-label { color:var(--violet); }
    body.speaking   #state-label { color:var(--electric); }
    body.confirming #state-label { color:var(--gold); }

    /* ── CONVERSATION ──────────────────────────────────────────────────── */
    #conv {
      width:100%; max-width:560px;
      display:flex; flex-direction:column; gap:10px;
      overflow-y:auto; flex-shrink:1;
      scrollbar-width:none; padding-bottom:4px;
    }
    #conv::-webkit-scrollbar{ display:none; }

    .msg {
      padding:12px 16px; border-radius:8px;
      line-height:1.55; font-size:1em; font-weight:400;
      animation:msg-in 0.3s ease;
    }
    @keyframes msg-in { from{opacity:0;transform:translateY(6px);} to{opacity:1;transform:none;} }
    .msg.user {
      background:var(--bg3); border:1px solid var(--border);
      color:var(--muted); font-family:'JetBrains Mono',monospace;
      font-size:0.82em; align-self:flex-end; max-width:85%;
    }
    .msg.user::before{ content:'▸ '; color:var(--electric); opacity:0.5; }
    .msg.storm {
      background:linear-gradient(135deg,rgba(0,212,255,0.04)0%,rgba(139,92,246,0.04)100%);
      border:1px solid rgba(0,212,255,0.14); font-size:1em; font-weight:500;
    }
    .msg.confirm-prompt {
      background:rgba(245,166,35,0.06);
      border:1px solid rgba(245,166,35,0.3); color:var(--gold);
    }
    .msg.error {
      background:rgba(255,68,68,0.05);
      border:1px solid rgba(255,68,68,0.2); color:var(--danger); font-size:0.88em;
    }

    /* ── CONTROLS BAR ──────────────────────────────────────────────────── */
    #controls {
      flex-shrink:0;
      border-top:1px solid var(--border);
      background:rgba(6,8,16,0.97);
      backdrop-filter:blur(12px);
      padding:14px 16px 20px;
      display:flex; flex-direction:column; gap:14px; align-items:center;
    }

    /* Main mic row */
    #mic-row {
      display:flex; align-items:center; gap:20px; width:100%;
      justify-content:center;
    }

    #mic-btn {
      width:68px; height:68px; border-radius:50%;
      border:2px solid rgba(0,212,255,0.3);
      background:rgba(0,212,255,0.05);
      color:var(--electric); cursor:pointer;
      display:flex; align-items:center; justify-content:center;
      transition:all 0.2s cubic-bezier(0.34,1.56,0.64,1);
      outline:none; touch-action:none;
      -webkit-user-select:none; user-select:none;
    }
    #mic-btn:hover { border-color:var(--electric); background:rgba(0,212,255,0.1); }
    #mic-btn.active {
      border-color:var(--electric);
      background:rgba(0,212,255,0.18);
      transform:scale(0.95);
      box-shadow:0 0 30px rgba(0,212,255,0.4);
    }
    #mic-btn svg{ width:26px;height:26px; }

    .mic-hint {
      font-family:'JetBrains Mono',monospace;
      font-size:0.6em; color:var(--dim);
      text-align:center; line-height:1.6; letter-spacing:0.05em;
    }

    /* Confirm/Cancel — hidden until confirming state */
    #confirm-row {
      display:none; gap:12px;
      animation:msg-in 0.2s ease;
    }
    body.confirming #confirm-row { display:flex; }
    body.confirming #mic-row { opacity:0.25; pointer-events:none; }

    .cta {
      padding:13px 28px; border-radius:6px;
      font-family:'Rajdhani',sans-serif;
      font-size:1.05em; font-weight:700;
      letter-spacing:0.12em; cursor:pointer;
      transition:all 0.2s; border:1px solid;
      min-width:120px; text-align:center;
    }
    #btn-yes {
      background:rgba(34,197,94,0.1); border-color:rgba(34,197,94,0.4); color:var(--success);
    }
    #btn-yes:hover { background:rgba(34,197,94,0.2); box-shadow:0 0 20px rgba(34,197,94,0.2); }
    #btn-no {
      background:rgba(255,68,68,0.08); border-color:rgba(255,68,68,0.3); color:var(--danger);
    }
    #btn-no:hover { background:rgba(255,68,68,0.15); }

    /* Text input row */
    #input-row {
      display:flex; align-items:center; gap:8px; width:100%; max-width:520px;
    }
    #text-input {
      flex:1; background:var(--bg3); border:1px solid var(--border);
      border-radius:6px; padding:10px 14px;
      color:var(--text); font-family:'JetBrains Mono',monospace; font-size:0.82em;
      outline:none; transition:border-color 0.2s;
    }
    #text-input:focus{ border-color:rgba(0,212,255,0.4); }
    #text-input::placeholder{ color:var(--dim); }

    #send-btn {
      width:40px;height:40px; border-radius:6px;
      border:1px solid var(--border); background:transparent;
      color:var(--muted); cursor:pointer; display:flex;
      align-items:center; justify-content:center;
      transition:all 0.2s;
    }
    #send-btn:hover { border-color:var(--electric); color:var(--electric); }
    #send-btn svg{ width:16px;height:16px; }

    #mute-btn {
      width:40px;height:40px; border-radius:6px;
      border:1px solid var(--border); background:transparent;
      color:var(--muted); cursor:pointer; display:flex;
      align-items:center; justify-content:center; transition:all 0.2s;
    }
    #mute-btn:hover { border-color:var(--danger); color:var(--danger); }
    #mute-btn.muted { background:rgba(255,68,68,0.1); border-color:var(--danger); color:var(--danger); }
    #mute-btn svg{ width:16px;height:16px; }

    /* ── TOAST ──────────────────────────────────────────────────────────── */
    #toast {
      position:fixed; bottom:140px; left:50%; transform:translateX(-50%) translateY(8px);
      background:var(--bg3); border:1px solid var(--border);
      padding:9px 18px; border-radius:6px;
      font-family:'JetBrains Mono',monospace; font-size:0.68em;
      color:var(--muted); opacity:0; transition:all 0.3s;
      pointer-events:none; z-index:100; white-space:nowrap;
    }
    #toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

    /* ── AUTH OVERLAY ───────────────────────────────────────────────────── */
    #auth-overlay {
      display:none;
      position:fixed; inset:0; z-index:200;
      background:rgba(6,8,16,0.95);
      backdrop-filter:blur(12px);
      align-items:center; justify-content:center; flex-direction:column;
      text-align:center; padding:30px;
    }
    #auth-overlay.show { display:flex; }
    .auth-bolt { font-size:3em; margin-bottom:12px; animation:bolt 2s ease-in-out infinite; }
    .auth-title {
      font-family:'Bebas Neue',sans-serif;
      font-size:2em; letter-spacing:0.15em;
      color:var(--electric); margin-bottom:8px;
    }
    .auth-sub {
      color:var(--muted); font-size:0.9em; margin-bottom:28px; line-height:1.5;
    }
    .auth-connect-btn {
      padding:14px 32px; border-radius:8px;
      border:1px solid rgba(0,212,255,0.4);
      background:rgba(0,212,255,0.08);
      color:var(--electric);
      font-family:'Rajdhani',sans-serif;
      font-size:1.1em; font-weight:700;
      letter-spacing:0.1em; cursor:pointer;
      transition:all 0.2s;
      display:flex; align-items:center; gap:10px;
    }
    .auth-connect-btn:hover {
      background:rgba(0,212,255,0.15);
      box-shadow:0 0 30px rgba(0,212,255,0.2);
    }
    .auth-skip {
      margin-top:16px; font-size:0.78em; color:var(--dim);
      cursor:pointer; text-decoration:underline;
    }
    .auth-skip:hover { color:var(--muted); }

    /* ── NO SPEECH WARNING ──────────────────────────────────────────────── */
    #no-speech {
      display:none;
      background:rgba(245,166,35,0.08); border:1px solid rgba(245,166,35,0.25);
      padding:8px 14px; border-radius:6px;
      font-size:0.75em; color:var(--gold);
      text-align:center; width:100%; max-width:520px;
    }

    /* ── RESPONSIVE ─────────────────────────────────────────────────────── */
    @media (max-width: 400px) {
      .logo-sub { display:none; }
      #orb-wrap { width:130px;height:130px;margin-bottom:14px; }
      #orb { width:64px;height:64px; }
      .ring:nth-child(1){ width:130px;height:130px; }
      .ring:nth-child(2){ width:104px;height:104px; }
      .ring:nth-child(3){ width:78px;height:78px; }
    }
  </style>
</head>
<body class="idle">
<div id="app">

  <!-- HEADER -->
  <header id="header">
    <div class="wordmark">
      <span class="bolt">⚡</span>
      <span class="logo-text">STORM</span>
      <span class="logo-sub">CLOUD</span>
    </div>
    <div id="user-area">
      <div id="status-row">
        <div class="dot-wrap" title="Brain"><div class="sdot warn" id="d-brain"></div><span class="dot-label">AI</span></div>
        <div class="dot-wrap" title="Voice"><div class="sdot ok" id="d-tts"></div><span class="dot-label">VOICE</span></div>
        <div class="dot-wrap" title="Google"><div class="sdot warn" id="d-google"></div><span class="dot-label">GOOGLE</span></div>
      </div>
      <span id="user-badge"></span>
      <button id="connect-btn" onclick="connectGoogle()">Connect Google</button>
    </div>
  </header>

  <!-- STAGE -->
  <main id="stage">
    <div id="orb-wrap">
      <div class="ring"></div>
      <div class="ring"></div>
      <div class="ring"></div>
      <div id="orb"></div>
    </div>
    <div id="state-label">IDLE</div>
    <div id="conv"></div>
  </main>

  <!-- CONTROLS -->
  <div id="controls">

    <!-- Mic row -->
    <div id="mic-row">
      <div class="mic-hint">HOLD<br>TO TALK</div>

      <button id="mic-btn" title="Hold to talk">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
          <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
          <line x1="12" y1="19" x2="12" y2="23"/>
          <line x1="8" y1="23" x2="16" y2="23"/>
        </svg>
      </button>

      <div class="mic-hint">SPACE<br>SHORTCUT</div>
    </div>

    <!-- Confirm row (visible only in confirming state) -->
    <div id="confirm-row">
      <button class="cta" id="btn-yes" onclick="sendConfirm()">✓ CONFIRM</button>
      <button class="cta" id="btn-no"  onclick="sendCancel()">✕ CANCEL</button>
    </div>

    <!-- Text input row -->
    <div id="input-row">
      <input id="text-input" type="text" placeholder="Type a command..." autocomplete="off" autocorrect="off" spellcheck="false"/>
      <button id="send-btn" onclick="sendText()" title="Send">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="22" y1="2" x2="11" y2="13"/>
          <polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
      <button id="mute-btn" onclick="toggleMute()" title="Mute">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
          <path id="vol-waves" d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/>
          <line id="mute-x1" x1="23" y1="9" x2="17" y2="15" style="display:none"/>
          <line id="mute-x2" x1="17" y1="9" x2="23" y2="15" style="display:none"/>
        </svg>
      </button>
    </div>

    <div id="no-speech">Voice unavailable — use text input or open in Chrome</div>

  </div>
</div>

<!-- AUTH OVERLAY -->
<div id="auth-overlay">
  <div class="auth-bolt">⚡</div>
  <div class="auth-title">STORM</div>
  <p class="auth-sub">Connect your Google account to give Storm access to Gmail, Calendar, and Drive.</p>
  <button class="auth-connect-btn" onclick="connectGoogle()">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
      <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
      <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
      <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
      <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
    </svg>
    Connect Google Account
  </button>
  <div class="auth-skip" onclick="dismissOverlay()">Skip for now (voice only, no integrations)</div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<script src="client.js"></script>
</body>
</html>
